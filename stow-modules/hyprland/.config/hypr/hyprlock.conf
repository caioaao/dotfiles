general {
    hide_cursor = true
}

auth {
    fingerprint {
        enabled = true
        ready_message = Scan fingerprint or enter password
        present_message = Scanning...
        retry_delay = 250
    }
}

background {
    monitor =
    color = rgba(1e1e2eff)
}

# Clock
label {
    monitor =
    text = $TIME
    font_size = 72
    color = rgba(cdd6f4ff)
    position = 0, 80
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 22
    color = rgba(a6adc8ff)
    position = 0, 10
    halign = center
    valign = center
}

# Fingerprint status
label {
    monitor =
    text = $FPRINTPROMPT
    font_size = 14
    color = rgba(a6adc8ff)
    position = 0, -140
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    outer_color = rgba(88888aff)
    inner_color = rgba(2a2a2eff)
    font_color = rgba(cdd6f4ff)
    check_color = rgba(a6e3a1ff)
    fail_color = rgba(f38ba8ff)
    fade_on_empty = true
    placeholder_text = Password...
    fail_text = $PAMFAIL
    position = 0, -80
    halign = center
    valign = center
}
