# ── Monitor ────────────────────────────────────────────────────────────────
monitor = ,preferred,auto,auto

# ── Autostart ─────────────────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = mako
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = 1password --silent
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# polkit agent for GUI auth dialogs
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1

# ── Input ──────────────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}

# ── General ────────────────────────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(88888aff)
    col.inactive_border = rgba(45475aff)
    layout = dwindle
}

# ── Decoration ─────────────────────────────────────────────────────────────
decoration {
    rounding = 6
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# ── Animations ─────────────────────────────────────────────────────────────
animations {
    enabled = true
    animation = windows, 1, 3, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
}

# ── Layout ─────────────────────────────────────────────────────────────────
dwindle {
    preserve_split = true
}

# ── Window Rules ───────────────────────────────────────────────────────────
windowrulev2 = float, class:^(1Password)$
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Save As)(.*)$

# ── Keybindings ────────────────────────────────────────────────────────────
$mod = SUPER

# Terminal
bind = $mod, Return, exec, ghostty

# App launcher
bind = $mod, Space, exec, fuzzel

# Close window
bind = $mod, Q, killactive

# Tile / move windows
bind = $mod ALT, Left, movewindow, l
bind = $mod ALT, Right, movewindow, r
bind = $mod ALT, Up, movewindow, u
bind = $mod ALT, Down, movewindow, d

# Move window to other monitor
bind = $mod ALT SHIFT, Left, movewindow, mon:l
bind = $mod ALT SHIFT, Right, movewindow, mon:r

# Toggle maximize (fullscreen type 1 = maximize, keeps bar visible)
bind = $mod, M, fullscreen, 1

# True fullscreen
bind = $mod, F, fullscreen, 0

# Toggle floating
bind = $mod, V, togglefloating

# Focus movement
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Workspace switching
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Volume
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshots
bind = , Print, exec, grimblast copy area
bind = SHIFT, Print, exec, grimblast copy screen

# Lock screen
bind = $mod, Escape, exec, hyprlock

# Resize with mod + right mouse button
bindm = $mod, mouse:273, resizewindow

# Move with mod + left mouse button
bindm = $mod, mouse:272, movewindow
